<svg width="550" height="320" viewBox="0 0 550 320" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变与滤镜定义 -->
  <defs>
    <!-- 卡片背景渐变 -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#1e1e1e" />
    </linearGradient>
    <!-- 标题栏背景渐变 -->
    <linearGradient id="titleBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3c3c3c" />
      <stop offset="100%" stop-color="#303030" />
    </linearGradient>
    <!-- 缩略图背景渐变 -->
    <linearGradient id="thumbBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <!-- 卡片外发光投影 -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- 背景板 -->
  <rect width="100%" height="100%" fill="#181818" rx="8" />
  
  <!-- 网格背景饰纹 -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="40" y1="0" x2="40" y2="320" />
    <line x1="80" y1="0" x2="80" y2="320" />
    <line x1="120" y1="0" x2="120" y2="320" />
    <line x1="160" y1="0" x2="160" y2="320" />
    <line x1="200" y1="0" x2="200" y2="320" />
    <line x1="240" y1="0" x2="240" y2="320" />
    <line x1="280" y1="0" x2="280" y2="320" />
    <line x1="320" y1="0" x2="320" y2="320" />
    <line x1="360" y1="0" x2="360" y2="320" />
    <line x1="400" y1="0" x2="400" y2="320" />
    <line x1="440" y1="0" x2="440" y2="320" />
    <line x1="480" y1="0" x2="480" y2="320" />
    <line x1="520" y1="0" x2="520" y2="320" />
    
    <line x1="0" y1="40" x2="550" y2="40" />
    <line x1="0" y1="80" x2="550" y2="80" />
    <line x1="0" y1="120" x2="550" y2="120" />
    <line x1="0" y1="160" x2="550" y2="160" />
    <line x1="0" y1="200" x2="550" y2="200" />
    <line x1="0" y1="240" x2="550" y2="240" />
    <line x1="0" y1="280" x2="550" y2="280" />
  </g>

  <!-- 卡片主体 -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="40" width="340" height="240" rx="10" fill="url(#cardBg)" stroke="#444444" stroke-width="1.5" />
    
    <!-- TitleBorder (标题栏) -->
    <path d="M 50.75 50 C 50.75 44.5 54.5 40.75 60 40.75 L 380 40.75 C 385.5 40.75 389.25 44.5 389.25 50 L 389.25 83.2 L 50.75 83.2 Z" fill="url(#titleBg)" />
    
    <!-- 应用小图标 -->
    <rect x="66" y="52" width="16" height="16" rx="3" fill="#0078d4" />
    <circle cx="74" cy="60" r="4" fill="#ffffff" />
    
    <!-- 标题文字 -->
    <text x="94" y="64" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" letter-spacing="0.3">Touch-Rev Config</text>
    
    <!-- 关闭按钮 -->
    <g transform="translate(352, 50)">
      <rect width="20" height="20" rx="4" fill="transparent" />
      <!-- X 形状 -->
      <line x1="6" y1="6" x2="14" y2="14" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round" />
      <line x1="14" y1="6" x2="6" y2="14" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- ContentFrame (缩略图) -->
    <rect x="50.75" y="83.2" width="338.5" height="196" rx="0" ry="0" fill="url(#thumbBg)" />
    <path d="M 50.75 83.2 L 389.25 83.2 L 389.25 270 C 389.25 275.5 385.5 279.25 380 279.25 L 60 279.25 C 54.5 279.25 50.75 275.5 50.75 270 Z" fill="url(#thumbBg)" />
    
    <!-- 缩略图中的示意画面 (象征窗口内容) -->
    <rect x="65" y="98" width="310" height="166" rx="6" fill="#1e1e1e" stroke="#333333" stroke-width="1" />
    <text x="220" y="186" fill="#555555" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">DWM THUMBNAIL HOST</text>
  </g>

  <!-- 标线与说明 -->
  <!-- TitleBorder 标线 -->
  <line x1="395" y1="60" x2="440" y2="60" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="3,3" />
  <circle cx="395" cy="60" r="3" fill="#0078d4" />
  <text x="448" y="64" fill="#888888" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500">TitleBorder (权重: 1.8)</text>

  <!-- ContentFrame 标线 -->
  <line x1="395" y1="180" x2="440" y2="180" stroke="#00c853" stroke-width="1.5" stroke-dasharray="3,3" />
  <circle cx="395" cy="180" r="3" fill="#00c853" />
  <text x="448" y="184" fill="#888888" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500">ContentFrame (权重: 8.2)</text>

  <!-- 10px 圆角标线 -->
  <path d="M 45 285 L 30 300 L 15 300" fill="none" stroke="#ff9100" stroke-width="1.5" />
  <circle cx="51" cy="279" r="3" fill="#ff9100" />
  <text x="15" y="295" fill="#ff9100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" text-anchor="end">CornerRadius: 10px</text>
</svg>